<body>
  <section id="coverPage" class="cover-page">
    <div class="cover-card">
      <p class="cover-eyebrow">A Birthday Surprise</p>
      <h1 class="cover-title">Happy Birthday, Aisha</h1>
      <p class="cover-text">
        I made a small memory calendar for you. Tap the button below to open it.
      </p>

      <button id="openCalendarBtn" class="open-calendar-btn" type="button">
        Open Calendar
      </button>
    </div>
  </section>

  <main id="calendarApp" class="page hidden">
    <header class="hero">
      <p class="eyebrow">Birthday Surprise</p>
      <h1 id="title">Happy Birthday</h1>
      <p id="subtitle">Tap an available day to open the memory.</p>
    </header>

    <section class="controls" aria-label="Calendar navigation">
      <button id="prevBtn" type="button" aria-label="Previous month">Previous</button>
      <h2 id="monthLabel"></h2>
      <button id="nextBtn" type="button" aria-label="Next month">Next</button>
    </section>

    <section class="weekdays" aria-hidden="true">
      <span>Mon</span>
      <span>Tue</span>
      <span>Wed</span>
      <span>Thu</span>
      <span>Fri</span>
      <span>Sat</span>
      <span>Sun</span>
    </section>

    <section id="calendarGrid" class="calendar-grid" aria-live="polite"></section>
  </main>

  <div id="captionModal" class="caption-modal hidden" aria-hidden="true">
    <div id="captionBackdrop" class="caption-backdrop"></div>

    <section
      class="caption-sheet"
      role="dialog"
      aria-modal="true"
      aria-labelledby="dialogDate"
      aria-describedby="dialogCaption"
    >
      <button id="closeDialogBtn" class="close-btn" type="button" aria-label="Close">
        ×
      </button>

      <img id="dialogImage" alt="Selected memory photo" />
      <h3 id="dialogDate"></h3>
      <p id="dialogCaption"></p>
    </section>
  </div>

  <audio id="birthdayMusic" preload="auto" loop>
    <source src="music/birthday.mp3" type="audio/mpeg" />
  </audio>

  <script src="script.js"></script>
</body>
