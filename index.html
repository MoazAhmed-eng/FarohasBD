<!-- index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Memory Calendar</title>
  <meta
    name="description"
    content="An interactive birthday calendar with blurred photo previews and captions."
  />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section id="coverPage" class="cover-page">
    <div class="cover-card">
      <p class="cover-eyebrow">A Birthday Surprise</p>
      <h1 class="cover-title">Happy Birthday, Loletyy</h1>
      <p class="cover-text">
        I made a small memory calendar for you. Recapping all the days that you literally filled my heart with nothing but happiness.
      </p>
      <button id="openCalendarBtn" class="primary-btn" type="button">
        Open Calendar
      </button>
    </div>
  </section>

  <main id="calendarPage" class="page hidden">
    <header class="hero">
      <p class="eyebrow">Birthday Surprise</p>
      <h1 id="title">Happy Birthday</h1>
      <p id="subtitle">Tap an available day to open the memory.</p>
    </header>

    <section class="controls" aria-label="Calendar navigation test">
      <button id="prevBtn1" type="button" aria-label="Previous month">Previous</button>
      <h2 id="monthLabel"></h2>
      <button id="nextBtn1" type="button" aria-label="Next month">Next</button>
    </section>

    <section class="weekdays" aria-hidden="true">
      <span>Mon</span>
      <span>Tue</span>
      <span>Wed</span>
      <span>Thu</span>
      <span>Fri</span>
      <span>Sat</span>
      <span>Sun</span>
    </section>

    <section id="calendarGrid" class="calendar-grid" aria-live="polite"></section>
    <section class="controls" aria-label="Calendar navigation">
      <button id="prevBtn" type="button" aria-label="Previous month">Previous</button>
      <h2 id="monthLabel"></h2>
      <button id="nextBtn" type="button" aria-label="Next month">Next</button>
    </section>
  </main>

  <dialog id="captionDialog" class="caption-dialog" aria-labelledby="dialogDate">
    <form method="dialog" class="caption-panel">
      <button class="close-btn" aria-label="Close" value="close" type="submit">×</button>

      <img id="dialogImage" class="dialog-image" alt="Selected memory photo" />
      <div class="dialog-body">
        <h3 id="dialogDate" class="dialog-date"></h3>
        <p id="dialogCaption" class="dialog-caption"></p>
      </div>
    </form>
  </dialog>

  <script src="script.js"></script>
</body>
</html>
