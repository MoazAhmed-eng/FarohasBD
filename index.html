<!-- index.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Birthday Memory Calendar</title>
  <meta name="description" content="Interactive birthday calendar with blurred previews." />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <section id="coverPage" class="cover-page">
    <div class="cover-card">
      <p class="cover-eyebrow">A Birthday Surprise</p>
      <h1 class="cover-title">Happy Birthday, Aisha</h1>
      <p class="cover-text">
        I made a small memory calendar for you. Tap below to open it.
      </p>
      <button id="openCalendarBtn" class="primary-btn" type="button">
        Open Calendar
      </button>
    </div>
  </section>

  <main id="calendarPage" class="page hidden">
    <header class="hero">
      <p class="eyebrow">Birthday Surprise</p>
      <h1 id="title">Happy Birthday</h1>
      <p id="subtitle">Tap an available day to view the memory.</p>
    </header>

    <section class="controls" aria-label="Calendar navigation">
      <button id="prevBtn" type="button">Previous</button>
      <h2 id="monthLabel"></h2>
      <button id="nextBtn" type="button">Next</button>
    </section>

    <section class="weekdays" aria-hidden="true">
      <span>Mon</span>
      <span>Tue</span>
      <span>Wed</span>
      <span>Thu</span>
      <span>Fri</span>
      <span>Sat</span>
      <span>Sun</span>
    </section>

    <section id="calendarGrid" class="calendar-grid" aria-live="polite"></section>
  </main>

  <section id="viewerPage" class="viewer-page hidden">
    <div class="viewer-shell">
      <button id="backToCalendarBtn" class="secondary-btn" type="button">
        Back To Calendar
      </button>
      <img id="viewerImage" class="viewer-image" alt="Selected memory photo" />
      <h2 id="viewerDate" class="viewer-date"></h2>
      <p id="viewerCaption" class="viewer-caption"></p>
    </div>
  </section>

  <script src="script.js"></script>
</body>
</html>
